<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Leaf — Índice</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
<meta name="theme-color" content="#2d7a3a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="img/icons/apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --verde: #2d7a3a;
    --azul: #1565c0;
    --amarillo: #ffe066;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    background: radial-gradient(ellipse at center, #16281a 0%, #060d07 100%);
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 50px 20px 70px;
  }
  .indice-emoji { font-size: 3.5rem; margin-bottom: 10px; }
  .indice-titulo {
    font-family: 'Bubblegum Sans', cursive;
    font-size: 2.4rem;
    color: var(--amarillo);
    text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
    margin-bottom: 6px;
    text-align: center;
  }
  .indice-subtitulo {
    color: rgba(255,255,255,0.7);
    margin-bottom: 44px;
    text-align: center;
  }
  .libros {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 32px;
    max-width: 1000px;
    width: 100%;
  }
  .libro-card {
    display: flex;
    text-decoration: none;
    width: 280px;
    border-radius: 6px 20px 20px 6px;
    box-shadow: -8px 8px 0px rgba(0,0,0,0.45), -4px 4px 24px rgba(0,0,0,0.5);
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.08);
    transition: transform 0.15s ease;
  }
  .libro-card:hover { transform: translateY(-4px); }
  .libro-lomo { width: 28px; min-width: 28px; background: rgba(0,0,0,0.25); }
  .libro-contenido {
    flex: 1;
    padding: 32px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    color: white;
  }
  .libro-emoji { font-size: 2.8rem; margin-bottom: 14px; }
  .libro-titulo {
    font-family: 'Bubblegum Sans', cursive;
    font-size: 1.35rem;
    color: var(--amarillo);
    margin-bottom: 10px;
    line-height: 1.3;
  }
  .libro-desc {
    font-size: 0.9rem;
    color: rgba(255,255,255,0.85);
    line-height: 1.6;
    margin-bottom: 18px;
  }
  .libro-btn {
    background: var(--amarillo);
    color: #1a3a1f;
    border: none;
    border-radius: 30px;
    padding: 10px 26px;
    font-size: 0.95rem;
    font-family: 'Bubblegum Sans', cursive;
    box-shadow: 0 3px 0 #b8860b;
  }
  .card-libro1 { background: linear-gradient(160deg, #1e5c22, #2d7a3a, #1a4a1a); }
  .card-libro2 { background: linear-gradient(160deg, #0d3a6e, #1565c0, #0a2a52); }
  .card-cumple { background: linear-gradient(160deg, #7a1e5c, #b8226e, #4a0a3a); }
  .card-extra  { background: linear-gradient(160deg, #4a2b7a, #6a3bb0, #2a1650); }
</style>
</head>
<body>

<div class="indice-emoji">🌿</div>
<div class="indice-titulo">Super Leaf</div>
<div class="indice-subtitulo">Elegí qué libro querés leer</div>

<div class="libros" id="libros"></div>

<script>
  // ════════════════════════════════════════════════════════════════
  //  📚 LISTA DE APPS / LIBROS
  //  Para agregar otra: copiá un bloque { ... } y cambiá los datos.
  //    archivo → el nombre del HTML          emoji → el ícono
  //    titulo / desc → texto (podés usar <br> para cortar renglón)
  //    clase → color de la tapa: card-libro1 (verde) · card-libro2 (azul)
  //            · card-cumple (rosa) · card-extra (violeta)
  // ════════════════════════════════════════════════════════════════
  const LIBROS = [
    {
      archivo: "super-leaf-y-el-bosque-magico.html",
      emoji: "🌿",
      titulo: "Super Leaf<br>y el Bosque Mágico",
      desc: "Libro 1 — completo.<br>Siete amigas descubren que tienen poderes increíbles.",
      clase: "card-libro1"
    },
    {
      archivo: "super-leaf-y-la-fairy-hero-academy.html",
      emoji: "🌟",
      titulo: "Super Leaf y la<br>Fairy Hero Academy",
      desc: "Libro 2.<br>El equipo tiene una nueva academia y una nueva amenaza en las sombras.",
      clase: "card-libro2"
    },
    {
      archivo: "Cumple-super-leaf-y-el-bosque-magico.html",
      emoji: "🎂",
      titulo: "Super Leaf<br>Cuento de Cumpleaños",
      desc: "Versión reducida del Libro 1, pensada para regalar en el cumple.",
      clase: "card-cumple"
    }
  ];

  document.getElementById('libros').innerHTML = LIBROS.map(function (l) {
    return '<a class="libro-card ' + l.clase + '" href="' + l.archivo + '">'
      + '<div class="libro-lomo"></div>'
      + '<div class="libro-contenido">'
      + '<div class="libro-emoji">' + l.emoji + '</div>'
      + '<div class="libro-titulo">' + l.titulo + '</div>'
      + '<div class="libro-desc">' + l.desc + '</div>'
      + '<span class="libro-btn">📖 Leer</span>'
      + '</div></a>';
  }).join('');

  // Registrar el service worker → permite "Instalar" la app y usarla sin conexión.
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('sw.js').catch(function () {});
    });
  }
</script>

</body>
</html>
